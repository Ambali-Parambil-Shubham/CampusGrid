<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Command | CampusGrid Senior Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="env.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body id="appBody">
    <div class="toast-container" id="toastContainer"></div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div style="background: var(--text-accent); color: var(--deep-forest); width: 44px; height: 44px; border-radius: 12px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;">🛡</div>
                <span class="brand-name" style="font-size: 1.25rem; font-weight: 900; letter-spacing: -1px; color: var(--text-accent);">CampusGrid</span>
            </div>
            <nav class="nav-group">
                <div class="nav-item active" onclick="switchView('radar', this)"><span>📡</span> <span>RADAR</span></div>
                <div class="nav-item" onclick="switchView('approvals', this)"><span>🔔</span> <span>APPROVALS</span></div>
                <div class="nav-item" onclick="switchView('history', this)"><span>📋</span> <span>LOGS</span></div>
                <div class="nav-item" onclick="switchView('settings', this)"><span>⚙️</span> <span>SETTINGS</span></div>
            </nav>
            <div style="margin-top: auto; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 16px;">
                <p id="profileName" style="font-size: 0.8rem; font-weight: 800; color: var(--text-accent);">Loading...</p>
                <p id="sidebarRoleTitle" style="font-size: 0.65rem; opacity: 0.6; margin-bottom: 1rem;">COMMAND SUPERVISOR</p>
                <button onclick="Auth.logout()" class="btn" style="width: 100%; font-size: 0.7rem; background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.2);">SIGN OUT</button>
            </div>
        </aside>

        <main class="main-wrapper">
            <header class="top-bar">
                <h2 class="view-title" id="pageTitle">COMMAND RADAR</h2>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <div id="stat-sync" class="badge badge-returned" style="font-size: 0.6rem;">SYNC ACTIVE</div>
                    <div style="width: 32px; height: 32px; background: var(--text-accent); color: var(--deep-forest); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900;" id="userInitial">?</div>
                </div>
            </header>

            <div class="content-scroll">
                <!-- Radar View -->
                <div id="view-radar" class="view-section">
                    <div class="stats-grid" id="statsGrid" style="grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem;">
                        <!-- Dense tiles injected by JS -->
                    </div>
                    <div class="card">
                        <h3 style="margin-bottom: 2rem; font-size: 1.25rem;">CURRENTLY OFF-CAMPUS</h3>
                        <div id="radarList"></div>
                    </div>
                </div>

                <!-- Approvals View -->
                <div id="view-approvals" class="view-section" style="display: none;">
                    <div class="card">
                        <h3 style="margin-bottom: 2rem; font-size: 1.25rem;">AUTHORIZATION QUEUE</h3>
                        <div id="approvalList"></div>
                    </div>
                </div>

                <!-- History View -->
                <div id="view-history" class="view-section" style="display: none;">
                    <div class="card">
                        <h3 style="margin-bottom: 2rem; font-size: 1.25rem;">TRANSIT HISTORY LEDGER</h3>
                        <div id="fullHistoryList"></div>
                    </div>
                </div>
                <div id="view-settings" class="view-section" style="display: none;">
                    <div class="settings-layout">
                        <nav class="settings-nav">
                            <button class="settings-tab-btn active" onclick="switchTab('profile')">COMMAND ID</button>
                            <button class="settings-tab-btn" onclick="switchTab('security')">SECURITY</button>
                            <button class="settings-tab-btn" onclick="switchTab('prefs')">PREFS</button>
                        </nav>
                        
                        <div class="settings-content active" id="profile">
                            <article style="max-width: 320px; background: rgba(0,0,0,0.2); padding: 1.25rem; border-radius: 12px; border: 1px solid var(--border);">
                                <h3 id="idCardName" style="font-size: 1.1rem;">Loading...</h3>
                                <p style="font-size: 0.6rem; color: var(--text-accent); font-weight: 800; margin: 4px 0 1rem;">POSITION: HUB SUPERVISOR</p>
                                <div style="display: flex; gap: 0.5rem;">
                                    <div style="flex: 1; height: 32px; background: rgba(255,255,255,0.05); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem;">W-AUTH</div>
                                    <div style="flex: 1; height: 32px; background: rgba(255,255,255,0.05); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem;">LEVEL 4</div>
                                </div>
                            </article>
                        </div>

                        <div class="settings-content" id="security">
                            <div class="form-row"><label>ACCESS KEY</label><input type="password" class="input-control" placeholder="••••••••"></div>
                            <div class="form-row"><label>AUTH PIN</label><input type="password" class="input-control" placeholder="••••"></div>
                        </div>

                        <div class="settings-content" id="prefs">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                <span style="font-size: 0.75rem;">Command Alerts</span>
                                <div class="switch on"><div class="switch-knob"></div></div>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-size: 0.75rem;">Compact Mode</span>
                                <div class="switch on" onclick="toggleCompact()"><div class="switch-knob"></div></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const UI = {
            toast: (m) => { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = 'toast'; t.textContent = m; c.appendChild(t); setTimeout(()=>t.remove(), 4000); }
        };

        let currentUser = null;
        function switchView(vId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + vId).style.display = 'block';
            el.classList.add('active'); document.getElementById('pageTitle').textContent = el.innerText.trim();
        }

        function switchTab(tId) {
            document.querySelectorAll('.settings-tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.settings-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tId).classList.add('active');
        }

        function toggleCompact() {
            document.getElementById('appBody').classList.toggle('compact-mode');
            UI.toast(document.getElementById('appBody').classList.contains('compact-mode') ? 'Compact Mode Active' : 'Compact Mode Disabled');
        }

        async function init() {
            currentUser = Auth.requireRole('WARDEN'); if (!currentUser) return;
            document.getElementById('profileName').textContent = currentUser.full_name;
            document.getElementById('userInitial').textContent = currentUser.full_name.charAt(0).toUpperCase();
            document.getElementById('idCardName').textContent = currentUser.full_name;
            document.getElementById('sidebarRoleTitle').textContent = `HUB SUPERVISOR | ${currentUser.college_id}`;
            fetchData();
        }

        async function fetchData() {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '<div class="skeleton" style="height:60px; grid-column: span 4;"></div>';
            
            const { data: all } = await supabaseClient.from('leave_requests').select('*, students(roll_no, users(full_name))').order('created_at', { ascending: false });
            if(!all) return;

            const outCount = all.filter(r => r.status === 'OUT').length;
            const pendCount = all.filter(r => r.status === 'PENDING').length;
            const retCount = all.filter(r => r.status === 'RETURNED').length;
            const appCount = all.filter(r => r.status === 'APPROVED').length;

            statsGrid.innerHTML = `
                <div class="card" style="padding: 0.75rem; border-radius: 12px;">
                    <p class="stat-label">OUT</p>
                    <p class="stat-value" style="font-size: 1.1rem; color:var(--mustard)">${outCount}</p>
                </div>
                <div class="card" style="padding: 0.75rem; border-radius: 12px;">
                    <p class="stat-label">PENDING</p>
                    <p class="stat-value" style="font-size: 1.1rem; color:var(--text-accent)">${pendCount}</p>
                </div>
                <div class="card" style="padding: 0.75rem; border-radius: 12px;">
                    <p class="stat-label">RETURNED</p>
                    <p class="stat-value" style="font-size: 1.1rem; color:var(--emerald)">${retCount}</p>
                </div>
                <div class="card" style="padding: 0.75rem; border-radius: 12px;">
                    <p class="stat-label">AUTH</p>
                    <p class="stat-value" style="font-size: 1.1rem;">${appCount}</p>
                </div>
            `;

            const radarList = document.getElementById('radarList');
            const outArr = all.filter(r => r.status === 'OUT');
            if(outArr.length === 0) radarList.innerHTML = `<div class="empty-state-container">ALL RESIDENTS ARE WITHIN CAMPUS</div>`;
            else radarList.innerHTML = outArr.map(r => `
                <div class="card" style="padding:1rem; margin-bottom:0.5rem; display:flex; justify-content:space-between; align-items:center; border-radius:12px;">
                    <div><p style="font-weight:800; font-size:0.8rem;">${r.students?.users?.full_name}</p><p style="font-size:0.65rem; opacity:0.6;">ROLL: ${r.students?.roll_no} | OUT UNTIL: ${r.to_date}</p></div>
                    <div class="badge badge-out">OUT</div>
                </div>
            `).join('');

            const approvalList = document.getElementById('approvalList');
            const pends = all.filter(r => r.status === 'PENDING');
            if(pends.length === 0) approvalList.innerHTML = `<div class="empty-state-container">AUTHORIZATION QUEUE IS CLEAR</div>`;
            else approvalList.innerHTML = pends.map(r => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; gap:1.5rem; margin-bottom:0.75rem; padding: 1.25rem; border-left:3px solid var(--text-accent);">
                    <div><h4 style="font-size:0.9rem;">${r.students?.users?.full_name}</h4><p style="font-size:0.75rem; opacity:0.7; margin-top:2px;">REASON: ${r.reason}</p></div>
                    <div style="display:flex; gap:0.5rem;">
                        <button onclick="processLeave('${r.leave_id}', 'APPROVED')" class="btn btn-primary" style="padding:0.5rem 1rem; font-size:0.65rem;">APPROVE</button>
                        <button onclick="processLeave('${r.leave_id}', 'REJECTED')" class="btn" style="background:rgba(239,68,68,0.05); color:#EF4444; border:1px solid rgba(239,68,68,0.1); padding:0.5rem 1rem; font-size:0.65rem;">REJECT</button>
                    </div>
                </div>
            `).join('');

            const histList = document.getElementById('fullHistoryList');
            histList.innerHTML = all.map(r => `
                <div class="card" style="padding:1rem; margin-bottom:0.5rem; display:flex; justify-content:space-between; align-items:center; border-radius:12px;">
                    <div><p style="font-weight:800; font-size:0.8rem;">${r.students?.users?.full_name}</p><p style="font-size:0.65rem; opacity:0.6;">AUTH ID: ${r.leave_id.substring(0,8).toUpperCase()}</p></div>
                    <div class="badge ${r.status==='OUT'?'badge-out':r.status==='RETURNED'?'badge-returned':'badge-pending'}">${r.status}</div>
                </div>
            `).join('');
        }

        async function processLeave(id, status) {
            try {
                await supabaseClient.from('leave_requests').update({ status, approved_by: currentUser.user_id }).eq('leave_id', id);
                UI.toast(`Application ${status}`);
                fetchData();
            } catch (err) { UI.toast(err.message); }
        }
        init();
    </script>
</body>
</html>
  init();
    </script>
</body>
</html>
