<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard Terminal | CampusGrid Senior Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="env.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body id="appBody">
    <div class="toast-container" id="toastContainer"></div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div style="background: var(--text-accent); color: var(--deep-forest); width: 44px; height: 44px; border-radius: 12px; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;">🛡</div>
                <span class="brand-name" style="font-size: 1.25rem; font-weight: 900; letter-spacing: -1px; color: var(--text-accent);">CampusGrid</span>
            </div>
            <nav class="nav-group">
                <div class="nav-item active" onclick="switchView('scanner', this)"><span>🚪</span> <span>SCANNER</span></div>
                <div class="nav-item" onclick="switchView('logs', this)"><span>📋</span> <span>LOGS</span></div>
                <div class="nav-item" onclick="switchView('settings', this)"><span>⚙️</span> <span>SETTINGS</span></div>
            </nav>
            <div style="margin-top: auto; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 16px;">
                <p id="profileName" style="font-size: 0.8rem; font-weight: 800; color: var(--text-accent);">Loading...</p>
                <p id="sidebarRoleTitle" style="font-size: 0.65rem; opacity: 0.6; margin-bottom: 1rem;">SEC-POST G1</p>
                <button onclick="Auth.logout()" class="btn" style="width: 100%; font-size: 0.7rem; background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.2);">SIGN OUT</button>
            </div>
        </aside>

        <main class="main-wrapper">
            <header class="top-bar">
                <h2 class="view-title" id="pageTitle">IDENTITY SCANNER</h2>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <div id="stat-gate" class="badge badge-returned" style="font-size: 0.6rem;">GATE-01 ARMED</div>
                    <div style="width: 32px; height: 32px; background: var(--text-accent); color: var(--deep-forest); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900;" id="userInitial">?</div>
                </div>
            </header>

            <div class="content-scroll">
                <!-- Scanner View -->
                <div id="view-scanner" class="view-section" style="max-width: 600px; margin: 0 auto;">
                    <div style="display: flex; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 16px; margin-bottom: 2rem;">
                        <button id="toggle-exit" class="btn active" style="flex: 1; background: var(--text-accent); color: var(--deep-forest);" onclick="setScanType('EXIT')">EXIT (OUT)</button>
                        <button id="toggle-entry" class="btn" style="flex: 1; background: transparent; color: #fff;" onclick="setScanType('ENTRY')">ENTRY (IN)</button>
                    </div>

                        <div class="card" style="padding: 1.5rem; text-align: center; max-width: 480px; margin: 0 auto;">
                            <div class="scanner-area" style="height: 180px; margin-bottom: 1.5rem;">
                                <div class="scan-line" style="box-shadow: 0 0 10px var(--text-accent); height: 1px;"></div>
                                <div style="height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem; opacity: 0.1;">📱</div>
                            </div>
                            <p style="color: var(--text-accent); font-size: 0.65rem; font-weight: 800; letter-spacing: 1.5px; margin-bottom: 1.5rem; opacity: 0.6;" id="scannerStatus">AWAITING TOKEN</p>
                            
                            <form id="scanForm" onsubmit="handleScan(event)">
                                <input type="text" id="qrToken" class="input-control" placeholder="SCAN ID" required autocomplete="off" style="text-align: center; text-transform: uppercase; font-family: monospace; font-size: 1.5rem; font-weight: 900; letter-spacing: 4px; padding: 0.8rem; border-color: var(--text-accent); background: rgba(0,0,0,0.3);">
                                <button type="submit" id="scanBtn" class="btn btn-primary" style="width: 100%; margin-top: 1.25rem; padding: 0.8rem; font-size: 0.75rem;">AUTHORIZE TRANSIT →</button>
                            </form>
                            <div id="scanMsg" style="margin-top: 1.5rem; padding: 1rem; border-radius: 10px; display: none; font-weight: 800; font-size: 0.8rem;"></div>
                        </div>

                    <div style="margin-top: 3rem;">
                        <h4 style="font-size: 0.8rem; letter-spacing: 1.5px; opacity: 0.5; margin-bottom: 1.5rem;">RECENT SUCCESSES</h4>
                        <div id="miniLogList" style="display: flex; flex-direction: column; gap: 0.75rem;"></div>
                    </div>
                </div>

                <!-- Logs View -->
                <div id="view-logs" class="view-section" style="display: none;">
                    <div class="card">
                        <h3 style="margin-bottom: 2rem; font-size: 1.25rem;">TRANSIT ENTRY LOGS</h3>
                        <div id="logList"></div>
                    </div>
                </div>

                <!-- Settings View -->
                <div id="view-settings" class="view-section" style="display: none;">
                    <div class="settings-layout">
                        <nav class="settings-nav">
                            <button class="settings-tab-btn active" onclick="switchTab('profile')">POST ID</button>
                            <button class="settings-tab-btn" onclick="switchTab('security')">SECURITY</button>
                            <button class="settings-tab-btn" onclick="switchTab('prefs')">PREFS</button>
                        </nav>
                        
                        <div class="settings-content active" id="profile">
                            <article style="max-width: 320px; background: rgba(0,0,0,0.2); padding: 1.25rem; border-radius: 12px; border: 1px solid var(--border);">
                                <h3 id="idCardName" style="font-size: 1.1rem;">Loading...</h3>
                                <p style="font-size: 0.6rem; color: var(--text-accent); font-weight: 800; margin: 4px 0 1rem;">SEC-POST: GATE 01</p>
                                <div style="display: flex; gap: 0.5rem;">
                                    <div style="flex: 1; height: 32px; background: rgba(255,255,255,0.05); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.55rem;">TERM-G1</div>
                                    <div style="flex: 1; height: 32px; background: rgba(255,255,255,0.05); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.55rem;">SEC-LVL 2</div>
                                </div>
                            </article>
                        </div>

                        <div class="settings-content" id="security">
                            <div class="form-row"><label>ACCESS KEY</label><input type="password" class="input-control" placeholder="••••••••"></div>
                            <div class="form-row"><label>STATION PIN</label><input type="password" class="input-control" placeholder="••••"></div>
                        </div>

                        <div class="settings-content" id="prefs">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                <span style="font-size: 0.75rem;">Audio Alerts</span>
                                <div class="switch on"><div class="switch-knob"></div></div>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-size: 0.75rem;">Compact Mode</span>
                                <div class="switch on" onclick="toggleCompact()"><div class="switch-knob"></div></div>
                            </div>
                        </div>
                        </div>
                    </div>
            </div>
        </main>
    </div>

    <script>
        const UI = {
            toast: (m) => { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = 'toast'; t.textContent = m; c.appendChild(t); setTimeout(()=>t.remove(), 4000); }
        };

        let currentUser = null; let currentScanType = 'EXIT';
        function switchView(vId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + vId).style.display = 'block';
            el.classList.add('active'); document.getElementById('pageTitle').textContent = el.innerText.trim();
        }

        function setScanType(type) {
            currentScanType = type;
            document.getElementById('toggle-exit').style.background = (type === 'EXIT') ? 'var(--text-accent)' : 'transparent';
            document.getElementById('toggle-exit').style.color = (type === 'EXIT') ? 'var(--deep-forest)' : '#fff';
            document.getElementById('toggle-entry').style.background = (type === 'ENTRY') ? 'var(--text-accent)' : 'transparent';
            document.getElementById('toggle-entry').style.color = (type === 'ENTRY') ? 'var(--deep-forest)' : '#fff';
            UI.toast(`SCAN MODE: ${type}`);
        }

        function switchTab(tId) {
            document.querySelectorAll('.settings-tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.settings-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tId).classList.add('active');
        }

        function toggleCompact() {
            document.getElementById('appBody').classList.toggle('compact-mode');
            UI.toast(document.getElementById('appBody').classList.contains('compact-mode') ? 'Compact Mode Active' : 'Compact Mode Disabled');
        }

        async function init() {
            currentUser = Auth.requireRole('GUARD'); if (!currentUser) return;
            document.getElementById('profileName').textContent = currentUser.full_name;
            document.getElementById('userInitial').textContent = currentUser.full_name.charAt(0).toUpperCase();
            document.getElementById('idCardName').textContent = currentUser.full_name;
            document.getElementById('sidebarRoleTitle').textContent = `SEC-POST G1 | ${currentUser.college_id}`;
            fetchLogs();
        }

        async function handleScan(e) {
            e.preventDefault();
            const btn = document.getElementById('scanBtn'); const token = document.getElementById('qrToken').value.trim().toUpperCase(); const msg = document.getElementById('scanMsg');
            btn.disabled = true; btn.textContent = 'RESOLVING ID...';
            try {
                const { data: sUser } = await supabaseClient.from('users').select('*').eq('college_id', token).maybeSingle();
                if (!sUser) throw new Error('STUDENT IDENTITY UNKNOWN');

                const targetStatus = (currentScanType === 'EXIT') ? 'APPROVED' : 'OUT';
                const { data: leave } = await supabaseClient.from('leave_requests')
                    .select('*')
                    .eq('student_id', sUser.user_id)
                    .eq('status', targetStatus)
                    .order('created_at', { ascending: false })
                    .limit(1)
                    .maybeSingle();

                if (!leave) throw new Error(`NO VALID ${currentScanType} AUTH FOUND`);
                
                let next = currentScanType === 'EXIT' ? 'OUT' : 'RETURNED';
                await supabaseClient.from('leave_requests').update({ status: next }).eq('leave_id', leave.leave_id);
                await supabaseClient.from('gate_logs').insert([{ leave_id: leave.leave_id, guard_id: currentUser.user_id, scan_type: currentScanType }]);
                
                UI.toast(`${currentScanType} AUTHORIZED`);
                msg.style.display = 'block'; msg.style.background = 'rgba(16, 185, 129, 0.1)'; msg.style.color = 'var(--emerald)'; msg.innerHTML = `AUTH GRANTED: ${sUser.college_id} | ${currentScanType}`;
                document.getElementById('qrToken').value = ''; fetchLogs();
            } catch (err) { 
                UI.toast(err.message); msg.style.display = 'block'; msg.style.background = 'rgba(239, 68, 68, 0.1)'; msg.style.color = '#EF4444'; msg.innerHTML = `DENIED: ${err.message}`;
            } finally { btn.disabled = false; btn.textContent = 'AUTHORIZE TRANSIT →'; }
        }

        async function fetchLogs() {
            const { data: logs } = await supabaseClient.from('gate_logs').select('*, leave_requests(students(users(full_name)))').eq('guard_id', currentUser.user_id).order('scan_time', { ascending: false }).limit(20);
            if(!logs) return;
            const logList = document.getElementById('logList'); const miniList = document.getElementById('miniLogList');
            if(logs.length === 0) { logList.innerHTML = `<div class="empty-state-container">GATE LEDGER EMPTY</div>`; miniList.innerHTML = ''; }
            else {
                logList.innerHTML = logs.map(l => `
                    <div class="card" style="padding:1.25rem; margin-bottom:0.75rem; display:flex; justify-content:space-between; align-items:center; border-radius:16px;">
                        <div><p style="font-weight:800; font-size:0.9rem;">${l.leave_requests?.students?.users?.full_name}</p><p style="font-size:0.75rem; opacity:0.6;">TIME: ${new Date(l.scan_time).toLocaleTimeString()}</p></div>
                        <div class="badge ${l.scan_type==='EXIT'?'badge-out':'badge-returned'}">${l.scan_type}</div>
                    </div>
                `).join('');
                miniList.innerHTML = logs.slice(0, 3).map(l => `
                    <div style="padding:1rem; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; display:flex; justify-content:space-between; align-items:center;">
                        <div><p style="font-weight:800; font-size:0.8rem; color:#fff;">${l.leave_requests?.students?.users?.full_name}</p><p style="font-size:0.65rem; opacity:0.4;">${new Date(l.scan_time).toLocaleTimeString()}</p></div>
                        <div class="badge ${l.scan_type==='EXIT'?'badge-out':'badge-returned'}" style="font-size:0.5rem; padding:0.25rem 0.5rem;">${l.scan_type}</div>
                    </div>
                `).join('');
            }
        }
        init();
    </script>
</body>
</html>
